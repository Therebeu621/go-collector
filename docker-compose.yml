services:
  postgres:
    image: postgres:16-alpine
    container_name: collector-pg
    environment:
      POSTGRES_USER: collector
      POSTGRES_PASSWORD: collector
      POSTGRES_DB: collector
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U collector" ]
      interval: 5s
      timeout: 3s
      retries: 5

  collector:
    build: .
    container_name: collector-app
    environment:
      DATABASE_URL: postgres://collector:collector@postgres:5432/collector?sslmode=disable
      LOG_FORMAT: json
      WORKERS: "4"
      RATE_LIMIT: "5"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
